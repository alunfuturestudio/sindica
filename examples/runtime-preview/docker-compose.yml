services:
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PREVIEW_ROOT: /preview-data
      PREVIEW_PORT_START: "31000"
      PREVIEW_PORT_COUNT: "1000"
      PREVIEW_TTL_HOURS: "24"
      PREVIEW_HOST: localhost
      PREVIEW_HEALTH_PATH: /
      # Replace these with project-owned commands. They run inside the workdir.
      PREVIEW_INSTALL_COMMAND: ""
      PREVIEW_BUILD_COMMAND: ""
      PREVIEW_MIGRATE_COMMAND: ""
      PREVIEW_START_COMMAND: "python3 -m http.server $$PORT --bind 0.0.0.0"
      # Optional custom health check. It receives PORT in the environment.
      PREVIEW_HEALTH_COMMAND: ""
    ports:
      - "127.0.0.1:31000-31999:31000-31999"
    volumes:
      - ../..:/workspace/app
      - runtime-preview-data:/preview-data
      - runtime-home:/home/node
    stdin_open: true
    tty: true

  # Keep or replace this service only when the app needs a database locally.
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - runtime-postgres:/var/lib/postgresql/data

volumes:
  runtime-preview-data:
  runtime-home:
  runtime-postgres:
